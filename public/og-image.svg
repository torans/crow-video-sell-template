<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Logo icon -->
  <circle cx="200" cy="315" r="80" fill="url(#accent)" opacity="0.2"/>
  <text x="200" y="335" font-family="sans-serif" font-size="80" font-weight="bold" fill="#a855f7" text-anchor="middle">AI</text>
  <!-- Title -->
  <text x="320" y="280" font-family="sans-serif" font-size="52" font-weight="bold" fill="#ffffff">乌鸦视频工厂</text>
  <text x="320" y="350" font-family="sans-serif" font-size="32" fill="#94a3b8">电商短视频全自动创作工具</text>
  <!-- Divider -->
  <rect x="320" y="390" width="200" height="4" rx="2" fill="url(#accent)"/>
  <!-- Features -->
  <text x="320" y="450" font-family="sans-serif" font-size="28" fill="#c4b5fd">✓ AI 自动写文案、配音、剪辑</text>
  <text x="320" y="500" font-family="sans-serif" font-size="28" fill="#c4b5fd">✓ 批量导出竖屏带货视频</text>
  <text x="320" y="550" font-family="sans-serif" font-size="28" fill="#c4b5fd">✓ 专为抖店 / TikTok 卖家设计</text>
</svg>
